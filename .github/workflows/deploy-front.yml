name: 'Frontend CI/CD'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: 'Baixar código'
        uses: actions/checkout@v4

      - name: 'Configurar Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 'Instalar dependências'
        run: npm ci

      - name: 'Buildar projeto'
        run: npm run build

      - name: 'Verificar arquivos de build'
        run: ls -la ./dist/gestao_psicologica_frontend/browser/

  deploy:
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 'Atualizar aplicação no EC2'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: '22'
          script: |
            cd /home/ec2-user/gestao_psico

            git -C gestao_psicologica_frontend pull origin main

            docker-compose build frontend_gestao_psicologica

            docker-compose up -d frontend_gestao_psicologica

            docker image prune -f
