@if (form) {
  <div class="w-full bg-white">
    <div class="rounded-xl border border-slate-100 bg-white shadow-sm">
      <div class="flex items-center gap-3 border-b border-slate-100 bg-slate-50/60 px-5 py-4">
        <div
          class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary/10 text-primary"
        >
          <z-icon zType="user" />
        </div>
        <div>
          <h2 class="text-lg font-bold text-slate-800">Editar Paciente</h2>
          <p class="text-xs text-slate-500">Dados cadastrais e contato.</p>
        </div>
      </div>

      <form [formGroup]="form" class="space-y-5 p-5">
        <section class="grid gap-4">
          <div class="space-y-1.5">
            <label for="nome" class="flex items-center gap-2 text-sm font-semibold text-slate-700">
              <z-icon zType="user" class="h-4 w-4 text-primary" />
              Nome completo
            </label>
            <input
              z-input
              id="nome"
              formControlName="nome"
              placeholder="Insira o nome do paciente..."
              class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700 outline-none transition-all placeholder:text-slate-400 focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/20"
            />
          </div>

          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div class="space-y-1.5">
              <label
                for="email"
                class="flex items-center gap-2 text-sm font-semibold text-slate-700"
              >
                <z-icon zType="mail" class="h-4 w-4 text-primary" />
                Email
              </label>
              <input
                z-input
                id="email"
                formControlName="email"
                placeholder="email@email.com"
                class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700 outline-none transition-all placeholder:text-slate-400 focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/20"
              />
            </div>

            <div class="space-y-1.5">
              <label
                for="telefone"
                class="flex items-center gap-2 text-sm font-semibold text-slate-700"
              >
                <z-icon zType="smartphone" class="h-4 w-4 text-primary" />
                Telefone
              </label>
              <input
                z-input
                id="telefone"
                formControlName="telefone"
                placeholder="(00) 0 0000-0000"
                mask="(00) 0 0000-0000"
                class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700 outline-none transition-all placeholder:text-slate-400 focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/20"
              />
            </div>
          </div>
        </section>

        <div class="flex justify-end gap-2 border-t border-slate-100 pt-4">
          <button
            type="button"
            class="patient-action patient-action-neutral cursor-pointer"
            (click)="cancelar()"
          >
            Cancelar
          </button>
          <button
            type="button"
            class="patient-action patient-action-primary cursor-pointer"
            [disabled]="form.invalid"
            (click)="editar()"
          >
            Salvar alterações
          </button>
        </div>
      </form>
    </div>
  </div>
}
