<div class="space-y-5">
  <div class="flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
    <p class="text-sm text-slate-500">Clique em uma data para criar um novo agendamento.</p>

    <div class="flex flex-col gap-2 lg:flex-row lg:items-center">
      <div class="legend-group">
        <span class="legend-title">Atendimento</span>
        @for (item of legendasAtendimento; track item.status) {
          <div class="legend-item">
            <span
              class="legend-dot"
              [style.backgroundColor]="getCorAtendimentoPorStatus(item.status)"
            ></span>
            <span>{{ item.label }}</span>
          </div>
        }
      </div>

      <div class="legend-group">
        <span class="legend-title">Pagamento</span>
        @for (item of legendasPagamento; track item.status) {
          <div class="legend-item">
            <span
              class="legend-dot"
              [style.backgroundColor]="getCorPagamentoPorStatus(item.status)"
            ></span>
            <span>{{ item.label }}</span>
          </div>
        }
      </div>
    </div>
  </div>

  <full-calendar #calendar [options]="calendarOptions"></full-calendar>
</div>
